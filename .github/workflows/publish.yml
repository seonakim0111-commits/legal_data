name: Publish data wheel

on:
  push:
    branches:
      - main
    paths:
      - "legal_data/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/card-legal-data/
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set package version
        id: version
        run: echo "value=$(TZ=Asia/Seoul date +'%Y.%-m.%-d.%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        env:
          HATCH_BUILD_VERSION: "${{ steps.version.outputs.value }}"
        run: |
          python -m pip install --upgrade build
          python -m build --wheel

      - name: Check wheel contents
        run: |
          python - <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              names = archive.namelist()

          data_files = [
              name for name in names
              if name.startswith("card_legal_data/")
              and (name.endswith(".json") or name.endswith(".md"))
          ]
          python_files = [name for name in names if name.endswith(".py")]

          if not data_files:
              sys.exit("wheel contains no JSON or Markdown data")
          if python_files:
              sys.exit(f"wheel unexpectedly contains Python files: {python_files[:5]}")

          size = wheel.stat().st_size
          if size >= 100 * 1024 * 1024:
              sys.exit(f"wheel is too large for the default PyPI limit: {size} bytes")

          print(f"{wheel}: {len(data_files)} data files, {size} bytes")
          PY

      - uses: pypa/gh-action-pypi-publish@release/v1
